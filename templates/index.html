<!DOCTYPE html>
<html>
<head>
    <title>Security Auditor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: monospace; margin: 20px; background: #f0f0f0; }
        h1 { border-bottom: 2px solid #000; }
        h2 { margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; margin: 10px 0; background: #fff; }
        th, td { border: 1px solid #000; padding: 8px; text-align: left; }
        th { background: #ccc; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #fff; border: 1px solid #000; padding: 10px; overflow: auto; }
        select { padding: 5px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <h1>Portable Security Auditor</h1>
    <p>Raspberry Pi Zero 2 W</p>

    <h2>System Status</h2>
    <table>
        <tr><th>Component</th><th>Status</th></tr>
        <tr><td>Pi Status</td><td id="pi-status">...</td></tr>
        <tr><td>USB Link</td><td id="usb-status">...</td></tr>
        <tr><td>Policy Engine</td><td id="policy-status">...</td></tr>
        <tr><td>HID System</td><td id="hid-status">...</td></tr>
    </table>

    <h2>HID Control</h2>
    <button onclick="enableHID()">Enable HID</button>
    <button onclick="disableHID()">Disable HID</button>
    <p id="hid-msg"></p>

    <h2>Execute Payload</h2>
    <select id="payload">
        <option value="">Select payload...</option>
    </select><br>
    <button onclick="executePayload()">Execute</button>
    <button onclick="clearLog()">Clear Log</button>
    <p id="exec-msg"></p>
    
    <h3>Live Execution Log</h3>
    <pre id="live-log" style="height: 200px; overflow-y: auto;">No execution yet</pre>

    <h2>Compliance Check</h2>
    <button onclick="runTest()">Run Test Check</button>
    <div id="compliance-result"></div>

    <h2>Last System Data</h2>
    <pre id="system-data">No data</pre>

    <script>
        function loadStatus() {
            fetch('/status').then(r => r.json()).then(d => {
                document.getElementById('pi-status').textContent = d.system.pi_status;
                document.getElementById('usb-status').textContent = d.system.usb_link;
                document.getElementById('policy-status').textContent = d.system.policy_engine;
                document.getElementById('hid-status').textContent = d.system.hid_enabled ? 'enabled' : 'disabled';
            });
        }

        function loadPayloads() {
            fetch('/hid/payloads').then(r => r.json()).then(p => {
                const sel = document.getElementById('payload');
                sel.innerHTML = '<option value="">Select payload...</option>';
                for (const [k, v] of Object.entries(p)) {
                    sel.innerHTML += `<option value="${k}">${v.name}</option>`;
                }
            });
        }

        function enableHID() {
            fetch('/hid/enable', {method: 'POST'}).then(r => r.json()).then(d => {
                document.getElementById('hid-msg').innerHTML = '<span class="success">HID enabled</span>';
                loadStatus();
            });
        }

        function disableHID() {
            fetch('/hid/disable', {method: 'POST'}).then(r => r.json()).then(d => {
                document.getElementById('hid-msg').innerHTML = '<span class="error">HID disabled</span>';
                loadStatus();
            });
        }

        function executePayload() {
            const p = document.getElementById('payload').value;
            if (!p) { alert('Select a payload'); return; }
            document.getElementById('live-log').textContent = 'Starting execution...';
            startLogPolling();
            fetch('/hid/execute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({payload: p, variables: {SERVER_IP: window.location.host.split(':')[0]}})
            }).then(r => r.json()).then(d => {
                if (d.success) {
                    document.getElementById('exec-msg').innerHTML = '<span class="success">Executed: ' + p + '</span>';
                } else {
                    document.getElementById('exec-msg').innerHTML = '<span class="error">Failed: ' + d.error + '</span>';
                }
                setTimeout(stopLogPolling, 2000);
            });
        }

        let logInterval = null;
        function startLogPolling() {
            if (logInterval) clearInterval(logInterval);
            logInterval = setInterval(loadLiveLog, 500);
        }

        function stopLogPolling() {
            if (logInterval) {
                clearInterval(logInterval);
                logInterval = null;
            }
        }

        function loadLiveLog() {
            fetch('/hid/live-log').then(r => r.json()).then(d => {
                const logs = d.logs;
                if (logs.length > 0) {
                    let text = '';
                    logs.forEach(log => {
                        const time = new Date(log.timestamp).toLocaleTimeString();
                        text += `[${time}] ${log.message}\n`;
                    });
                    const logEl = document.getElementById('live-log');
                    logEl.textContent = text;
                    logEl.scrollTop = logEl.scrollHeight;
                }
            });
        }

        function clearLog() {
            fetch('/hid/clear-log', {method: 'POST'}).then(() => {
                document.getElementById('live-log').textContent = 'Log cleared';
            });
        }

        function runTest() {
            const data = {
                hostname: 'TEST-PC',
                firewall_enabled: Math.random() > 0.5,
                antivirus_updated: Math.random() > 0.5,
                disk_encryption: Math.random() > 0.5
            };
            fetch('/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(r => r.json()).then(d => {
                let html = '<table><tr><th>Field</th><th>Value</th></tr>';
                html += '<tr><td>Compliant</td><td>' + (d.compliant ? 'YES' : 'NO') + '</td></tr>';
                html += '<tr><td>Host</td><td>' + d.host + '</td></tr>';
                html += '<tr><td>Timestamp</td><td>' + d.timestamp + '</td></tr>';
                if (d.issues.length > 0) {
                    html += '<tr><td>Issues</td><td>' + d.issues.join(', ') + '</td></tr>';
                }
                html += '</table>';
                document.getElementById('compliance-result').innerHTML = html;
                document.getElementById('system-data').textContent = JSON.stringify(data, null, 2);
            });
        }

        loadStatus();
        loadPayloads();
        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
